name: build-microshift
description: Reusable action to build MicroShift RPMs and container images

inputs:
  ushift-gitref:
    description: MicroShift git ref (branch, tag, commit) from https://github.com/openshift/microshift/branches
    required: true
  okd-version-tag:
    description: OKD version tag from https://quay.io/repository/okd/scos-release?tab=tags
    required: true
  bootc-image-url:
    description: Base Bootc image URL used in `make image` command
    required: false
    default: quay.io/centos-bootc/centos-bootc
  bootc-image-tag:
    description: Base Bootc image tag used in `make image` command
    required: false
    default: stream9
  isolated-network:
    description: Build and test the isolated network container image
    required: false
    default: 0
  ovnk-networking:
    description: Use OVN-K networking
    required: false
    default: 0
  with-multus:
    description: Enable Multus CNI
    required: false
    default: 0
  node-count:
    description: Number of nodes in the MicroShift cluster
    required: false
    default: 1
  build:
    description: Types of artifacts to build (all, packages, bootc-image)
    required: false
    default: all
  skip-prebuild:
    description: Skip the prebuild step
    required: false
    default: false

runs:
  using: "composite"
  steps:
    - name: Collect debug information before the build
      if: always()
      uses: ./.github/actions/debug-info

    - name: Prepare the build and run environment
      if: inputs.skip-prebuild == 'false'
      uses: ./.github/actions/prebuild

    - name: Build MicroShift RPMs
      if: contains(fromJSON('["all", "packages"]'), inputs.build)
      shell: bash
      run: |
        # See https://github.com/microshift-io/microshift/blob/main/docs/build.md
        # for more information about the build process.

        # Run the RPM build process.
        cd ${GITHUB_WORKSPACE}/
        make rpm \
          USHIFT_GITREF="${{ inputs.ushift-gitref }}" \
          OKD_VERSION_TAG="${{ inputs.okd-version-tag }}" \
          RPM_OUTDIR=/mnt/rpms

    - name: Build MicroShift bootc container image
      if: contains(fromJSON('["all", "bootc-image"]'), inputs.build)
      shell: bash
      run: |
        # See https://github.com/microshift-io/microshift/blob/main/docs/build.md
        # for more information about the build process.

        # Run the container image build process.
        cd ${GITHUB_WORKSPACE}/

        # Adjust the make options based on the inputs
        make_opts=()
        [ "${{ inputs.isolated-network }}" = "1" ] && make_opts+=("EMBED_CONTAINER_IMAGES=1")
        [ "${{ inputs.ovnk-networking }}"  = "1" ] && make_opts+=("WITH_KINDNET=0")
        [ "${{ inputs.with-multus }}"     = "1" ] && make_opts+=("WITH_MULTUS=1")

        make image \
          BOOTC_IMAGE_URL="${{ inputs.bootc-image-url }}" \
          BOOTC_IMAGE_TAG="${{ inputs.bootc-image-tag }}" \
          ${make_opts[@]}

    - name: Run a test to verify that MicroShift is functioning properly
      if: contains(fromJSON('["all", "bootc-image"]'), inputs.build)
      shell: bash
      run: |
        # See https://github.com/microshift-io/microshift/blob/main/docs/run.md
        # for more information about the run process.

        # Adjust the make options based on the inputs
        make_opts=()
        [ "${{ inputs.isolated-network }}" = "1" ] && make_opts+=("ISOLATED_NETWORK=1")

        # Run the MicroShift container
        make run ${make_opts[@]}

        # Verify that Internet access is not available in the container
        # when the isolated network is enabled
        if [ "${{ inputs.isolated-network }}" = "1" ]; then
          for cmd in "ping -c1 -W10 8.8.8.8" "curl -I -m 10 quay.io" "curl -I -m 10 ghcr.io"; do
            if sudo podman exec -i microshift-okd-1 ${cmd} ; then
              echo "ERROR: Internet access is available in the isolated network container"
              exit 1
            fi
          done
        fi

        # Start-stop test with readiness check
        make run-ready
        make run-healthy

        # Validate OVN-K networking when enabled
        if [ "${{ inputs.ovnk-networking }}" = "1" ]; then
          echo "=== Validating OVN-K networking ==="
          CONTAINER="microshift-okd-1"

          echo "Checking OVN-K pods in openshift-ovn-kubernetes namespace..."
          ovnk_pods=$(sudo podman exec -i "${CONTAINER}" \
            kubectl get pods -n openshift-ovn-kubernetes \
              --field-selector=status.phase=Running \
              -o name 2>&1) || true
          if [ -z "${ovnk_pods}" ]; then
            echo "ERROR: No running OVN-K pods found in openshift-ovn-kubernetes namespace"
            sudo podman exec -i "${CONTAINER}" kubectl get pods -n openshift-ovn-kubernetes -o wide || true
            exit 1
          fi
          echo "OVN-K pods running:"
          echo "${ovnk_pods}"

          echo "Checking OVN-K pod IP assignments..."
          pods_without_ip=$(sudo podman exec -i "${CONTAINER}" \
            kubectl get pods -n openshift-ovn-kubernetes \
              --field-selector=status.phase=Running \
              -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.podIP}{"\n"}{end}' 2>&1 \
            | awk -F'\t' '$2 == "" {print $1}')
          if [ -n "${pods_without_ip}" ]; then
            echo "ERROR: The following OVN-K pods have no IP address:"
            echo "${pods_without_ip}"
            sudo podman exec -i "${CONTAINER}" kubectl get pods -n openshift-ovn-kubernetes -o wide || true
            exit 1
          fi
          echo "All OVN-K pods have IP addresses assigned"

          echo "=== OVN-K networking validation passed ==="
        fi

        # Validate Multus when enabled
        if [ "${{ inputs.with-multus }}" = "1" ]; then
          echo "=== Validating Multus CNI ==="
          CONTAINER="microshift-okd-1"

          echo "Checking Multus pods in openshift-multus namespace..."
          multus_pods=$(sudo podman exec -i "${CONTAINER}" \
            kubectl get pods -n openshift-multus \
              --field-selector=status.phase=Running \
              -o name 2>&1) || true
          if [ -z "${multus_pods}" ]; then
            echo "ERROR: No running Multus pods found in openshift-multus namespace"
            sudo podman exec -i "${CONTAINER}" kubectl get pods -n openshift-multus -o wide || true
            exit 1
          fi
          echo "Multus pods running:"
          echo "${multus_pods}"

          if ! sudo podman exec -i "${CONTAINER}" \
            kubectl get crd network-attachment-definitions.k8s.cni.cncf.io >/dev/null 2>&1; then
            echo "ERROR: Multus NetworkAttachmentDefinition CRD not found"
            exit 1
          fi
          echo "Multus CRD verified: network-attachment-definitions.k8s.cni.cncf.io"

          echo "=== Multus CNI validation passed ==="
        fi

        for i in $(seq 2 ${{ inputs.node-count }}); do
          make add-node
        done

        make run-healthy
        make stop
        # Clean is necessary to avoid conflicts with other actions that may
        # potentially run in subsequent actions
        make clean

    # Uncomment this to enable tmate-debug on failure
    # - name: Pause and open tmate debug session
    #   if: failure()
    #   uses: ./.github/actions/tmate-debug

    - name: Collect debug information after the build
      if: always()
      uses: ./.github/actions/debug-info

    - name: Collect MicroShift container sos-report on failure
      if: failure()
      uses: ./.github/actions/sos-report
